arch: !include arch.yaml


science:
  # Specify science definitions here.

  v1_EU_default: &v1_EU
    # Path to the actual ecland executable. 
    binary_path: @CMAKE_BINARY_DIR@/bin/ecland-master-@ECLAND_PREC@

    # Path to the default namelist.
    namelist_url: file://@CMAKE_CURRENT_SOURCE_DIR@/namelist_v1_EU

    # Input data for the standard input files. These can be given as URLs,
    # so either as https://something or file:///home/me/something.
    data_init:
      - class_name: FetchHandler
        target_path: 'forcing'
        source_url: https://sites.ecmwf.int/repository/ecland/tests/v1/2D_EU-001_20220101-20220102/met_2DHT_EU-001_20220101-20220102.nc

      - class_name: FetchHandler
        target_path: 'soilinit'
        source_url: https://sites.ecmwf.int/repository/ecland/tests/v1/2D_EU-001_20220101-20220102/surfinit_EU-001_20220101-20220102.nc

      - class_name: FetchHandler
        target_path: 'surfclim'
        source_url: https://sites.ecmwf.int/repository/ecland/tests/v1/2D_EU-001_20220101-20220102/surfclim_EU-001_20220101-20220102.nc

    # Default parallel setup. May be overwritten at runtime by command line flags.
    job:
      tasks: 1
      cpus_per_task: 1

  v1_EU_centered:
    # Use YAML anchor/alias here to essentially copy the content of v1_EU_default
    # here and just override the namelists.
    <<: *v1_EU
    namelists:
      # Set additional namelist flags here. `mode` can also be `delete` or
      # `append`.
      - mode: set
        namelist: NAMDYN1S
        entry: NACCTYPE
        value: 0

  v1_EU_forward:
    <<: *v1_EU
    namelists:
      - mode: set
        namelist: NAMDYN1S
        entry: NACCTYPE
        value: 1

  v1_EU_multiprocess:
    <<: *v1_EU
    job:
      tasks: 2

  v1_EU_multithread:
    <<: *v1_EU
    job:
      tasks: 1
      cpus_per_task: 4

  v1_EU_multiprocess_thread:
    <<: *v1_EU
    job:
      tasks: 2
      cpus_per_task: 2

tech:
  # Specify technical setups here.
  default: {}

  debug:
    namelists:
      - mode: set
        namelist: NAM1S
        entry: LDBGS1
        value: true
      - mode: set
        namelist: NAM1S
        entry: IDBGS1
        value: 1
