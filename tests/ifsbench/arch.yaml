# Specify architecture definitions for different systems here

# Default architecture. Uses mpirun and no additional hardware information.
default:
  launcher:
    class_name: MpirunLauncher
  cpu_config: {}

# Architecture for the ECMWF "Atos" HPC2020 system in Bologna.
atos:
  launcher:
    class_name: SrunLauncher
  cpu_config:
    sockets_per_node: 2
    cores_per_socket: 64
    threads_per_core: 2
    gpus_per_node: 0

# Architecture for runs on the LUMI-C partition. Specifies default account
# and partition. Change this if necessary.
lumi-c:
  launcher:
    class_name: SrunLauncher
  cpu_config:
    sockets_per_node: 2
    cores_per_socket: 64
    threads_per_core: 2
    gpus_per_node: 0
  account: project_465000527
  partition: small
